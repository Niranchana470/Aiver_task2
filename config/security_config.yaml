# Offensive Security Agent - Level 1 Configuration
# Basic infrastructure scanning without AI features

# AWS Configuration
aws:
  profile: default
  region: us-east-1
  assume_role_arn: null
  external_id: null

# Security Checks Configuration
checks:
  S3SecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  IAMSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  SecurityGroupCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  EC2SecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  RDSSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  KMSSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  CloudTrailSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  LambdaSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

# Output Configuration
output:
  json: true
  markdown: true
  output_dir: reports

# Logging Configuration
logging:
  level: INFO
  log_dir: logs
  structured: true

# Execution Configuration
execution:
  max_workers: 10
  timeout: 600
  continue_on_error: true
