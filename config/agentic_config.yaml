# Offensive Security Agent - Level 2 Configuration  
# Multi-domain scanning with AI-powered agentic features

# AI Provider Configuration
ai_provider:
  provider: "mock"  # Options: "mock", "openai", "anthropic"
  model: "gpt-4"
  api_key: null  # Set OPENAI_API_KEY environment variable for OpenAI
  temperature: 0.0  # Low temp for consistent reasoning

# Guard Rails Configuration
guard_rails:
  allowed_account_ids: ["*"]  # Scan all accounts (use specific IDs for production)
  forbidden_account_ids: []  # Never scan these accounts
  read_only: true  # Only allow read operations
  require_approval_for_critical: true  # Require approval for critical operations
  dry_run: false  # Set true for testing (logs what would happen)

# AWS Configuration
aws:
  profile: default
  region: us-east-1
  assume_role_arn: null
  external_id: null

# Security Checks Configuration
checks:
  # Level 1: Infrastructure Checks
  S3SecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  IAMSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  SecurityGroupCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  EC2SecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  RDSSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  KMSSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  CloudTrailSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  LambdaSecurityCheck:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters: {}

  # Level 2: Multi-Domain Checks
  APIEndpointCheck:
    enabled: false  # Set true and configure endpoints below
    severity_threshold: Info
    timeout: 300
    parameters:
      endpoints:
        # - url: "https://api.example.com"
        #   name: "Production API"
        #   auth_required: true

  CVEScanner:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters:
      scan_paths: ["."]

  SecretsScanner:
    enabled: true
    severity_threshold: Info
    timeout: 300
    parameters:
      scan_paths: ["."]

# Output Configuration
output:
  json: true
  markdown: true
  output_dir: reports

# Logging Configuration
logging:
  level: INFO
  log_dir: logs
  structured: true

# Execution Configuration
execution:
  max_workers: 10
  timeout: 600
  continue_on_error: true

# Debug mode (enables verbose decision trace)
debug: false
